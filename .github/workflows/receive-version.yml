name: Receive Version Update

on:
  repository_dispatch:
    types: [docs-version-update]
  workflow_dispatch:
    inputs:
      previous_tag:
        type: string
        required: true
        description: "Tag da versao anterior (ex: v1.27.1)"
      new_tag:
        type: string
        required: true
        description: "Tag da nova versao (ex: v1.28.0)"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    env:
      PREV_TAG: ${{ github.event.client_payload.previous_tag || inputs.previous_tag }}
      NEW_TAG: ${{ github.event.client_payload.new_tag || inputs.new_tag }}
      VERSION: ${{ github.event.client_payload.docs_version || inputs.new_tag }}
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Checkout ERP repo
        uses: actions/checkout@v4
        with:
          repository: Despensinha/despensinha-admin-app
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: erp-repo
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The set +e / exit_code capture is load-bearing: subsequent steps
      # (Build PR body FAILED variant) rely on this step NOT failing the job
      # so they still run on AI errors. Keep the pattern if refactoring.
      - name: Generate AI content
        id: generate
        run: |
          set +e
          node scripts/ai/generate-content.mjs ./erp-repo "$PREV_TAG" "$NEW_TAG" > generate-result.json 2>generate-errors.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Configure git and create branch
        if: steps.generate.outputs.exit_code == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CLEAN_VERSION="${VERSION#v}"
          BRANCH="docs/v${CLEAN_VERSION}-update"
          git checkout -B "$BRANCH"
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> "$GITHUB_ENV"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Commit AI changes to latest
        id: commit_ai
        if: steps.generate.outputs.exit_code == '0'
        run: |
          git add src/content/docs/latest/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No AI changes detected in latest/"
          else
            git commit -m "docs(ai): update latest for v${CLEAN_VERSION}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create version snapshot
        if: steps.generate.outputs.exit_code == '0'
        run: |
          bash scripts/create-snapshot.sh "$CLEAN_VERSION"

      - name: Commit snapshot
        if: steps.generate.outputs.exit_code == '0'
        run: |
          SLUG="v$(echo "$CLEAN_VERSION" | tr '.' '-')"
          git add "src/content/docs/$SLUG/" src/config/versions.ts astro.config.mjs
          git diff --cached --quiet && echo "Nothing to commit for snapshot (unexpected)" && exit 1
          git commit -m "docs(snapshot): v${CLEAN_VERSION}"

      - name: Build PR body
        env:
          HAS_CHANGES: ${{ steps.commit_ai.outputs.has_changes || 'false' }}
          EXIT_CODE: ${{ steps.generate.outputs.exit_code }}
          CLEAN_VERSION: ${{ env.CLEAN_VERSION }}
        run: |
          node -e "
          const fs = require('fs');
          const exitCode = process.env.EXIT_CODE;
          const hasChanges = process.env.HAS_CHANGES;
          const version = process.env.CLEAN_VERSION;
          let body = '';

          if (exitCode !== '0') {
            let errors = '';
            try { errors = fs.readFileSync('generate-errors.log', 'utf-8'); } catch {}
            body = [
              '## AI Documentation Update - FAILED',
              '',
              'Content generation failed with exit code ' + exitCode + '.',
              '',
              '### Error Log',
              '',
              '\`\`\`',
              errors || 'No error log available.',
              '\`\`\`',
            ].join('\n');
          } else if (hasChanges !== 'true') {
            body = [
              '## AI Documentation Update - No Changes',
              '',
              '> A IA nao detectou mudancas no ERP que afetem a documentacao.',
              '> Este PR contem apenas o snapshot mecanico da versao v' + version + ' (identico a versao anterior).',
              '',
              'Commit unico: \`docs(snapshot): v' + version + '\`.',
            ].join('\n');
          } else {
            let r;
            try {
              r = JSON.parse(fs.readFileSync('generate-result.json', 'utf-8'));
            } catch (e) {
              body = [
                '## AI Documentation Update - FAILED',
                '',
                'Could not parse generate-result.json: ' + e.message,
              ].join('\n');
              fs.writeFileSync('pr-body.md', body);
              process.exit(0);
            }

            const lines = [
              '## AI Documentation Update',
              '',
              '> **Estrutura:** este PR contem 2 commits.',
              '> - Commit 1 — \`docs(ai): update latest for v' + version + '\` — modificacoes da IA em \`latest/\` (foco da revisao)',
              '> - Commit 2 — \`docs(snapshot): v' + version + '\` — copia mecanica para \`v' + version.replace(/\./g, '-') + '/\` + edits em \`versions.ts\`/\`astro.config.mjs\`',
              '>',
              '> Para revisar apenas as modificacoes: aba **Commits** -> selecione o commit 1.',
              '',
            ];
            lines.push('### Summary', r.summary || 'No summary available.', '');

            if (r.updated && r.updated.length > 0) {
              lines.push('### Pages Updated');
              r.updated.forEach(function(u) { lines.push('- ' + u.page); });
              lines.push('');
            }

            if (r.created && r.created.length > 0) {
              lines.push('### Pages Created');
              r.created.forEach(function(c) { lines.push('- ' + c.page + ' (' + c.title + ')'); });
              lines.push('');
            }

            if (r.deleted && r.deleted.length > 0) {
              lines.push('### Pages Deleted/Updated (removed content)');
              r.deleted.forEach(function(d) { lines.push('- ' + d.page + ' (' + d.note + ')'); });
              lines.push('');
            }

            if (r.failures && r.failures.length > 0) {
              lines.push('### Failures');
              r.failures.forEach(function(f) { lines.push('- **' + f.page + '**: ' + f.error); });
              lines.push('');
            }

            body = lines.join('\n');
          }

          fs.writeFileSync('pr-body.md', body);
          "

      - name: Cleanup temp artifacts
        run: rm -rf erp-repo generate-result.json generate-errors.log

      - name: Push and create PR
        if: steps.generate.outputs.exit_code == '0'
        run: |
          git push origin "$BRANCH" --force-with-lease
          gh pr create --title "docs(ai): update v${CLEAN_VERSION}" --body-file pr-body.md --base main || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
