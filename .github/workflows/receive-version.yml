name: Receive Version Update

on:
  repository_dispatch:
    types: [docs-version-update]

permissions:
  contents: read

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - name: Log received payload
        run: |
          echo "## Version Update Received" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **App Version:** ${{ github.event.client_payload.app_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Docs Version:** ${{ github.event.client_payload.docs_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ github.event.client_payload.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source Repo:** ${{ github.event.client_payload.source_repo }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Changes Summary:** ${{ github.event.client_payload.changes_summary }}" >> "$GITHUB_STEP_SUMMARY"

